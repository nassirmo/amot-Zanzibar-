<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Amot Zanzibar</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;margin:0;padding:10px;color:#fff}
.container{max-width:500px;margin:0 auto;background:#2d2d2d;padding:20px;border-radius:12px}
h2{text-align:center;color:#4ade80;margin-top:0}
label{font-weight:600;margin-top:15px;display:block;font-size:14px;color:#e5e5e5}
input,select{width:100%;padding:12px;margin-top:5px;border:1px solid #555;border-radius:8px;box-sizing:border-box;font-size:16px;background:#1a1a1a;color:#fff}
button{width:100%;padding:15px;margin-top:20px;border:none;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;color:#000}
#priceBtn{background:#4ade80}
#btnWasilisha{background:#22c55e;display:none}
.payment-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px}
.payment-btn{background:#404040;color:#fff;padding:12px;font-size:14px;margin-top:0}
.payment-btn.selected{background:#4ade80;color:#000}
#beiContainer,#paymentInfo,#uploadBox{margin-top:20px;padding:15px;background:#1a3a1a;border-left:5px solid #4ade80;display:none;border-radius:8px}
#debug{font-size:12px;color:#4ade80;text-align:center;min-height:15px}
</style>
</head>
<body>
<div class="container">
  <h2>Amot Zanzibar</h2>
  <div id="debug">Loading...</div>

  <label>Namba yako ya Simu</label>
  <input type="tel" id="mtejaPhone" placeholder="07XX XXX XXX">

  <label>Anapotaka Kuchukuliwa</label>
  <input type="text" id="pickup" placeholder="Stone Town">

  <label>Anakoenda</label>
  <input type="text" id="dropoff" placeholder="Airport">

  <label>Umbali (km)</label>
  <input type="number" id="distance" placeholder="10">

  <label>Chagua Chombo</label>
  <select id="vehicleType">
    <option value="Bodaboda">Bodaboda - 1 Person</option>
    <option value="Bajaji">Bajaji - 2-3 People</option>
    <option value="Sedan">Sedan Car - 4 People</option>
    <option value="Pickup">Pickup - Mizigo</option>
  </select>

  <label>Chagua Njia ya Malipo:</label>
  <div class="payment-buttons">
    <button class="payment-btn" data-method="M-Pesa">M-Pesa</button>
    <button class="payment-btn" data-method="Tigo Pesa">Tigo Pesa</button>
    <button class="payment-btn" data-method="Airtel Money">Airtel Money</button>
    <button class="payment-btn" data-method="Halopesa">Halopesa</button>
  </div>
  <div id="selectedText" style="text-align:center;margin-top:10px;font-weight:bold">Umechagua: None</div>
  <button id="priceBtn">Pata Bei Yako</button>

  <div id="beiContainer">
    <h3 style="margin-top:0;color:#4ade80">TZS <span id="onyeshaBei">0</span></h3>
    <p><span id="onyeshaUmbali">0</span> km</p>
    <p>Deposit 30%: TZS <span id="onyeshaDeposit">0</span></p>
    <p id="driverInfo" style="font-weight:bold;color:#4ade80"></p>
  </div>

  <div id="paymentInfo">
    <h4>LIPA DEPOSIT SASA</h4>
    <p>1. Tuma TZS <span id="kiasiChaKulipa">0</span> kwenda:</p>
    <p id="nambaYaMalipo" style="font-size:20px;font-weight:bold;text-align:center;color:#4ade80"></p>
  </div>

  <div id="uploadBox">
    <h4>Thibitisha Malipo Yako</h4>
    <label>Namba ya Muamala/Transaction ID</label>
    <input type="text" id="transId" placeholder="MFANO: MP240423.1234.A12345">
    <button id="btnWasilisha">WASILISHA UTHIBITISHO</button>
  </div>
</div>

<script>
document.getElementById('debug').innerText='JS: Starting...';
window.onerror=function(msg){document.getElementById('debug').innerText='ERROR: '+msg;return false};

document.addEventListener('DOMContentLoaded',function(){
  try{
    var njiaYaMalipo="";
    var beiYaMwisho=0;
    var depositAmount=0;
    var NAMBA_YA_MMILIKI="255779771085";
    var NAMBA_ZA_MALIPO={"M-Pesa":"255712345678","Tigo Pesa":"255779771085","Airtel Money":"255783823722","Halopesa":"255625678901"};

    document.querySelectorAll('.payment-btn').forEach(btn=>{
      btn.onclick=()=>{
        njiaYaMalipo=btn.dataset.method;
        document.querySelectorAll('.payment-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('selectedText').innerText='Umechagua: '+njiaYaMalipo;
      }
    });

    document.getElementById('priceBtn').onclick=function(){
      var phone=document.getElementById('mtejaPhone').value.trim();
      var pickup=document.getElementById('pickup').value.trim();
      var dropoff=document.getElementById('dropoff').value.trim();
      var distanceKm=parseFloat(document.getElementById('distance').value);
      var vehicle=document.getElementById('vehicleType').value;

      if(!phone)return alert('Tafadhali andika namba yako ya simu');
      if(!pickup)return alert('Tafadhali andika anapotaka kuchukuliwa');
      if(!dropoff)return alert('Tafadhali andika anakoenda');
      if(!distanceKm||distanceKm<=0)return alert('Tafadhali andika umbali kwa km');
      if(!njiaYaMalipo)return alert('Chagua njia ya malipo kwanza');

      var beiPerKm=0,basePrice=0;
      if(vehicle==="Bodaboda"){basePrice=500;beiPerKm=600}
      if(vehicle==="Bajaji"){basePrice=1000;beiPerKm=1000}
      if(vehicle==="Sedan"){basePrice=2000;beiPerKm=1500}
      if(vehicle==="Pickup"){basePrice=5000;beiPerKm=2500}

      beiYaMwisho=Math.round(basePrice+(beiPerKm*distanceKm));
      depositAmount=Math.round(beiYaMwisho*0.3);

      document.getElementById('onyeshaBei').innerText=beiYaMwisho.toLocaleString();
      document.getElementById('onyeshaDeposit').innerText=depositAmount.toLocaleString();
      document.getElementById('onyeshaUmbali').innerText=distanceKm;
      document.getElementById('driverInfo').innerText='Dereva Aliyepangwa: Juma';
      document.getElementById('kiasiChaKulipa').innerText=depositAmount.toLocaleString();
      document.getElementById('nambaYaMalipo').innerText=NAMBA_ZA_MALIPO[njiaYaMalipo];
      document.getElementById('beiContainer').style.display='block';
      document.getElementById('paymentInfo').style.display='block';
      document.getElementById('uploadBox').style.display='block';
      document.getElementById('btnWasilisha').style.display='block';
    };

    document.getElementById('btnWasilisha').onclick=function(){
      var transId=document.getElementById('transId').value.trim();
      if(!transId)return alert('Weka namba ya muamala');
      alert('Umefanikiwa kuwasilisha! Namba ya muamala: '+transId);
    };

    document.getElementById('debug').innerText='JS: Ready';
  }catch(e){
    document.getElementById('debug').innerText='ERROR: '+e.message
  }
});
</script>
</body>
</html>
