<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amot Zanzibar - Taxi & Transport</title>
  <style>
    :root { --primary:#2563eb; --primary-dark:#1d4ed8; --dark:#0f172a; --light:#f8fafc; --gray:#64748b; --success:#16a34a; --danger:#dc2626; --border:#e2e8f0; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, sans-serif; }
    body { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh; padding:20px 0; }
   .container { max-width:480px; margin:0 auto; padding:0 16px; }
   .card { background:white; border-radius:20px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
   .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
   .logo { font-size:1.75rem; font-weight:800; color:var(--primary); }
   .lang-switch select { padding:10px 14px; border:2px solid var(--border); border-radius:12px; font-size:14px; font-weight:600; background:white; cursor:pointer; }
    h2 { font-size:1.5rem; margin-bottom:20px; color:var(--dark); }
   .form-group { margin-bottom:18px; }
    label { display:block; font-weight:700; margin-bottom:8px; font-size:14px; color:var(--dark); }
    input[type="text"], select { width:100%; padding:14px; border:2px solid var(--border); border-radius:12px; font-size:16px; transition:all 0.2s; }
    input[type="text"]:focus, select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
   .checkbox-group { display:flex; align-items:center; margin-bottom:20px; background:#f1f5f9; padding:12px; border-radius:12px; }
    input[type="checkbox"] { width:20px; height:20px; margin-right:10px; accent-color:var(--primary); }
   .btn-primary { width:100%; padding:16px; background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color:white; border:none; border-radius:12px; font-size:17px; font-weight:700; cursor:pointer; transition:transform 0.2s; box-shadow:0 4px 12px rgba(37,99,235,0.4); }
   .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(37,99,235,0.5); }
   .btn-book { display:inline-block; margin-top:14px; padding:12px 24px; background:var(--success); color:white; text-decoration:none; border-radius:12px; font-weight:700; transition:all 0.2s; }
   .btn-book:hover { background:#15803d; transform:scale(1.05); }
   .error { background:#fef2f2; color:var(--danger); padding:14px; border-radius:12px; margin-bottom:16px; display:none; font-weight:600; border:2px solid #fecaca; }
   .price { background:linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color:#065f46; padding:18px; border-radius:12px; margin-top:18px; display:none; font-weight:700; border:2px solid #6ee7b7; }
   .payment { margin-bottom:20px; }
   .payment-label { font-weight:700; margin-bottom:8px; font-size:14px; color:var(--dark); }
   .payment button { padding:12px 20px; border:2px solid var(--primary); background:white; color:var(--primary); border-radius:12px; font-weight:700; cursor:pointer; transition:all 0.2s; }
   .payment button.active { background:var(--primary); color:white; }
    footer { text-align:center; margin-top:24px; color:white; font-size:13px; font-weight:500; }
    [dir="rtl"] { text-align:right; }
    [dir="rtl"].header { flex-direction:row-reverse; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo" data-lang="title">Amot Zanzibar</div>
        <div class="lang-switch">
          <select id="langselect" onchange="setLang(this.value)">
            <option value="en">🇬🇧 EN</option>
            <option value="sw">🇹🇿 SW</option>
            <option value="ar">🇸🇦 AR</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="it">🇮🇹 IT</option>
            <option value="de">🇩🇪 DE</option>
            <option value="zh">🇨🇳 ZH</option>
          </select>
        </div>
      </div>

      <h2 data-lang="form_title">Book Your Ride</h2>
      <div class="error" id="errorBox"></div>

      <div class="form-group">
        <label data-lang="label_pickup">Pick-up Location</label>
        <input type="text" id="pickup" data-ph="ph_pickup" autocomplete="off">
      </div>

      <div class="form-group">
        <label data-lang="label_dropoff">Drop-off Location</label>
        <input type="text" id="dropoff" data-ph="ph_dropoff" autocomplete="off">
      </div>

      <div class="form-group">
        <label data-lang="label_service">Service Type</label>
        <select id="service">
          <option value="" data-lang="opt_choose">-- Choose Service --</option>
          <option value="bodaboda" data-lang="opt_boda">Bodaboda - 1 Person - TSh2,000</option>
          <option value="airport" data-lang="opt_airport">Airport Pickup/Drop-off - TSh35,000</option>
          <option value="tour3" data-lang="opt_tour3">3-Hour City Tour - TShh100,000</option>
          <option value="fullday" data-lang="opt_fullday">Full Day Charter - TSh180,000</option>
          <option value="hourly" data-lang="opt_hourly">Hourly Service - TSh35,000/hr</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="loadingLabor">
        <label for="loadingLabor" data-lang="label_labor">I need loading labor (+TSh10,000)</label>
      </div>

      <div class="payment">
        <div class="payment-label" data-lang="label_payment">Choose Payment Method:</div>
        <button type="button" class="active">M-Pesa<>Tigo-Pesa<>Airtell-Money><Halo-Pesa</button>
      </div>

      <button class="btn-primary" onclick="calculatePrice()" data-lang="btn_price">Get Your Price</button>
      <div class="price" id="priceBox"></div>
    </div>

    <footer>
      <p>© 2026 Amot Zanzibar. All rights reserved.</p>
    </footer>
  </div>

      zh: {

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar'? 'rtl' : 'ltr';

      var elements = document.querySelectorAll('[data-lang]');
      for (var i = 0; i < elements.length; i++) {
        var key = elements[i].getAttribute('data-lang');
        if (T[currentLang] && T[currentLang][key]) {
          elements[i].textContent = T[currentLang][key];
        }
      }

      var placeholders = document.querySelectorAll('[data-ph]');
      for (var j = 0; j < placeholders.length; j++) {
        var key = placeholders[j].getAttribute('data-ph');
        if (T[currentLang] && T[currentLang][key]) {
          placeholders[j].placeholder = T[currentLang][key];
        }
      }

      document.getElementById('langselect').value = lang;
    }

    function calculatePrice() {
      var pickup = document.getElementById('pickup').value.trim();
      var dropoff = document.getElementById('dropoff').value.trim();
      var service = document.getElementById('service').value;
      var labor = document.getElementById('loadingLabor').checked;

      var errorBox = document.getElementById('errorBox');
      var priceBox = document.getElementById('priceBox');

      errorBox.style.display = 'none';
      priceBox.style.display = 'none';

      if (!pickup ||!dropoff ||!service) {
        errorBox.textContent = T[currentLang].error_fields;
        errorBox.style.display = 'block';
        return;
      }

      var total = 0;

      // BEI ZA MWANZO + BODABODA
      if (service === 'bodaboda') total = 2000;
      else if (service === 'airport') total = 35000;
      else if (service === 'tour3') total = 100000;
      else if (service === 'fullday') total = 180000;
      else if (service === 'hourly') total = 35000;
      else total = 50000//;

      if (labor) total = total + 10000;

      var msg = T[currentLang].price_prefix + ' Tsh' + total.tolocaleString() + '. ' + T[currentLang].price_suffix;
      priceBox.innerHTML = msg + '<br><a href="https://wa.me/2557797710852?text=Nataka%20' + service + '%20kutoka%20' + pickup + '%20kwenda%20' + dropoff + '%20kwa%20Tsh' + total + '" class="btn-book">' + T[currentLang].btn_book + '</a>';
      priceBox.style.display = 'block';
    }

    setLang(currentLang);
  </script>

</html>
