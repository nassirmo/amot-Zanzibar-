<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMOT Transport</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 15px; }
    select, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:disabled { background: #ccc; }
    .payment { border: 1px solid #ccc; padding: 10px; margin: 5px 0; cursor: pointer; }
    .selected { border: 2px solid #007bff; background: #e7f3ff; }
    #beiContainer { display: none; margin-top: 20px; padding: 15px; background: #f0f0f0; }
  </style>
</head>
<body>

  <h2 id="bookTitle">Agiza Safari Yako</h2>

  <label>Anapotaka Kuchukuliwa</label>
  <select id="pickup">
    <option value="">Chagua eneo</option>
    <option value="Stone Town">Stone Town</option>
    <option value="Airport">Airport</option>
    <option value="Mwanakwerekwe">Mwanakwerekwe</option>
    <option value="Michenzani">Michenzani</option>
    <option value="Mlandege">Mlandege</option>
    <option value="Mkokotoni">Mkokotoni</option>
    <option value="Nungwi">Nungwi</option>
    <option value="Kendwa">Kendwa</option>
    <option value="Paje">Paje</option>
    <option value="Jambiani">Jambiani</option>
  </select>

  <label>Anakoenda</label>
  <select id="dropoff">
    <option value="">Chagua eneo</option>
    <option value="Stone Town">Stone Town</option>
    <option value="Airport">Airport</option>
    <option value="Mwanakwerekwe">Mwanakwerekwe</option>
    <option value="Michenzani">Michenzani</option>
    <option value="Mlandege">Mlandege</option>
    <option value="Mkokotoni">Mkokotoni</option>
    <option value="Nungwi">Nungwi</option>
    <option value="Kendwa">Kendwa</option>
    <option value="Paje">Paje</option>
    <option value="Jambiani">Jambiani</option>
  </select>

  <label>Chagua Chombo</label>
  <select id="vehicleType">
    <option value="Bodaboda">Bodaboda - Mtu 1</option>
    <option value="Bajaji">Bajaji - Watu 3</option>
    <option value="Sedan">Sedan - Watu 4</option>
  </select>

  <label><input type="checkbox" id="labor"> Naomba msaada wa kubeba</label>

  <div class="payment" onclick="chaguaMalipo('Tigo Pesa', this)">Tigo Pesa</div>
  <div class="payment" onclick="chaguaMalipo('Airtel Money', this)">Airtel Money</div>

  <button id="priceBtn" onclick="hesabuBei()">Pata Bei Yako</button>

  <div id="beiContainer">
    <h3>Jumla: TZS <span id="onyeshaBei">0</span></h3>
    <p>Deposit ya 30%: TZS <span id="onyeshaDeposit">0</span></p>
    <p>Umbali: ~<span id="onyeshaUmbali">0</span> km</p>
  </div>

<script>
let njiaYaMalipo = "";
let beiYaMwisho = 0;

// Jedwali la umbali - BADILISHA KM KAMA UNAVIJUA VIZURI ZAIDI
const umbaliWaZones = {
  "Stone Town-Airport": 6, "Airport-Stone Town": 6,
  "Stone Town-Mwanakwerekwe": 3, "Mwanakwerekwe-Stone Town": 3,
  "Stone Town-Michenzani": 4, "Michenzani-Stone Town": 4,
  "Stone Town-Mlandege": 5, "Mlandege-Stone Town": 5,
  "Stone Town-Mkokotoni": 35, "Mkokotoni-Stone Town": 35,
  "Stone Town-Nungwi": 60, "Nungwi-Stone Town": 60,
  "Stone Town-Kendwa": 58, "Kendwa-Stone Town": 58,
  "Stone Town-Paje": 50, "Paje-Stone Town": 50,
  "Airport-Nungwi": 65, "Nungwi-Airport": 65,
  "Mlandege-Mkokotoni": 38, "Mkokotoni-Mlandege": 38,
};

function chaguaMalipo(mtandao, element) {
  njiaYaMalipo = mtandao;
  document.querySelectorAll('.payment').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
}

function hesabuBei() {
  const pickup = document.getElementById('pickup').value;
  const dropoff = document.getElementById('dropoff').value;
  const vehicle = document.getElementById('vehicleType').value;
  const labor = document.getElementById('labor').checked;

  if(pickup === "" || dropoff === "") {
    alert("Tafadhali chagua maeneo yote mawili");
    return;
  }
  if(njiaYaMalipo === "") {
    alert("Chagua njia ya malipo kwanza");
    return;
  }
  if(pickup === dropoff) {
    alert("Anapotaka kuchukuliwa na anakoenda isiwe sehemu moja");
    return;
  }

  const key = ${pickup}-${dropoff};
  const distanceKm = umbaliWaZones || 10; // 10km kama combo haijapatikana

  let beiPerKm = 0, basePrice = 2000;
  if(vehicle === "Bodaboda") beiPerKm = 800;
  if(vehicle === "Bajaji") beiPerKm = 1500;
  if(vehicle === "Sedan") beiPerKm = 2500;

  beiYaMwisho = Math.round(basePrice + (beiPerKm * distanceKm));
  if(labor) beiYaMwisho += 10000;

  document.getElementById('onyeshaBei').innerText = beiYaMwisho.toLocaleString();
  document.getElementById('onyeshaDeposit').innerText = (beiYaMwisho * 0.3).toLocaleString();
  document.getElementById('onyeshaUmbali').innerText = distanceKm;
  document.getElementById('beiContainer').style.display = 'block';
}
</script>

</body>
</html>
