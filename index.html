<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amot Zanzibar - Agiza Safari</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f9; margin: 0; padding: 10px; color: #333; }
.container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #008000; margin-top: 0; }
label { font-weight: 600; margin-top: 15px; display: block; font-size: 14px; }
input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
input:focus, select:focus { border-color: #008000; outline: none; }
button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: #fff; }
#priceBtn { background: #008000; }
#btnWasilisha { background: #25D366; display: none; }
#chatDereva { background: #128C7E; display: none; }
.payment-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
.payment-btn { background: #f0f0f0; color: #333; padding: 12px; font-size: 14px; margin-top: 0; }
.payment-btn.selected { background: #008000; color: #fff; }
#beiContainer, #paymentInfo, #subiriUthibitisho, #uploadBox { margin-top: 20px; padding: 15px; background: #e8f5e9; border-left: 5px solid #008000; display: none; }
#subiriUthibitisho { background: #fff3e0; border-left: 5px solid #ff9800; }
#debug { font-size: 12px; color: red; text-align: center; min-height: 15px; }
#adminPanel { display: none; }
.order-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
.order-card button { background: #008000; margin-top: 10px; padding: 10px; }
</style>
</head>
<body>
<div class="container">
  <div id="mtejaApp">
    <h2 id="title">Amot Zanzibar</h2>
    <div id="debug">Loading...</div>

    <div style="text-align: center; margin-bottom: 15px;">
      <select id="langSelect" style="width: 150px; padding: 5px; font-size: 14px;">
        <option value="sw">Kiswahili</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
    </div>

    <div id="fomuYote">
      <label id="labelPhone">Namba yako ya Simu</label>
      <input type="tel" id="mtejaPhone" placeholder="07XX XXX XXX">

      <label id="labelPickup">Anapotaka Kuchukuliwa</label>
      <input type="text" id="pickup" placeholder="Chagua au andika sehemu" list="maeneo">

      <label id="labelDropoff">Anakoenda</label>
      <input type="text" id="dropoff" placeholder="Chagua au andika sehemu" list="maeneo">
      <datalist id="maeneo">
        <option value="Stone Town"><option value="Airport"><option value="Mwanakwerekwe"><option value="Michenzani">
        <option value="Nungwi"><option value="Kendwa"><option value="Paje"><option value="Jambiani">
      </datalist>

      <label id="labelDistance">Umbali (km)</label>
      <input type="number" id="distance" placeholder="Auto au andika km">

      <label id="labelVehicle">Chagua Chombo</label>
      <select id="vehicleType">
        <option value="Bodaboda">Bodaboda - 1 Person</option>
        <option value="Bajaji">Bajaji - 2-3 People</option>
        <option value="Sedan">Sedan Car - 4 People</option>
        <option value="Pickup">Pickup - Mizigo</option>
      </select>

      <div style="margin-top: 15px;">
        <input type="checkbox" id="labor" style="width: auto; margin-right: 10px;">
        <label for="labor" id="labelLabor" style="display: inline; font-weight: normal;">Naomba msaada wa kubeba (+TSh 5,000)</label>
      </div>

      <label id="labelPayment">Chagua Njia ya Malipo:</label>
      <div class="payment-buttons">
        <button class="payment-btn" data-method="M-Pesa">M-Pesa</button>
        <button class="payment-btn" data-method="Tigo Pesa">Tigo Pesa</button>
        <button class="payment-btn" data-method="Airtel Money">Airtel Money</button>
        <button class="payment-btn" data-method="Halopesa">Halopesa</button>
      </div>
      <div id="selectedText" style="text-align:center; margin-top:10px; font-weight:bold;">Umechagua: None</div>

      <button id="priceBtn">Pata Bei Yako</button>
    </div>

    <div id="beiContainer">
      <h3 style="margin-top:0;">TZS <span id="onyeshaBei">0</span></h3>
      <p><span id="onyeshaUmbali">0</span> km</p>
      <p>Deposit 30%: TZS <span id="onyeshaDeposit">0</span></p>
      <p id="driverInfo" style="font-weight: bold; color: #128C7E;"></p>
    </div>

    <div id="paymentInfo">
      <h4 id="paymentTitle">LIPA DEPOSIT SASA</h4>
      <p id="paymentInstructions">1. Tuma TZS <span id="kiasiChaKulipa">0</span> kwenda:</p>
      <p id="nambaYaMalipo" style="font-size: 20px; font-weight: bold; text-align: center;"></p>
      <p>2. Piga picha ya muamala</p>
    </div>

    <div id="uploadBox">
      <h4>Thibitisha Malipo Yako</h4>
      <label>Namba ya Muamala/Transaction ID</label>
      <input type="text" id="transId" placeholder="MFANO: MP240423.1234.A12345">
      <label>Picha ya Muamala</label>
      <input type="file" id="pichaMuamala" accept="image/*">
      <button id="btnWasilisha">WASILISHA UTHIBITISHO</button>
    </div>

    <button id="chatDereva">CHAT NA DEREVA WAKO</button>
    <div id="subiriUthibitisho">Umefanikiwa kuwasilisha. Tunasubiri mmiliki athibitishe. Utapokea link ya dereva WhatsApp ndani ya dakika 2.</div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h2>Amot Admin - Oda Mpya</h2>
    <div id="ordersList"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var njiaYaMalipo = "";
  var beiYaMwisho = 0;
  var depositAmount = 0;
  var derevaAliyechaguliwa = null;

  // ===== BADILISHA HIZI =====
  var NAMBA_YA_MMILIKI = "255779771085";
  var NAMBA_ZA_MALIPO = { "M-Pesa": "255712345678", "Tigo Pesa": "255779771085", "Airtel Money": "255783823722", "Halopesa": "255625678901" };
  // ===========================

  var madereva = [
    { jina: "sefu rubeyaa", namba: "255776218038", eneo: "Stone Town", lat: -6.1659, lon: 39.1919 },
    { jina: "Ali", namba: "255713333222", eneo: "Mwanakwerekwe", lat: -6.1717, lon: 39.2186 }
  ];

  var coordinates = {
    "Stone Town": [-6.1659, 39.1919], "Airport": [-6.2186, 39.2231], "Mwanakwerekwe": [-6.1717, 39.2186],
    "Nungwi": [-5.7261, 39.2950], "Kendwa": [-5.7444, 39.2847], "Paje": [-6.2667, 39.5333], "Jambiani": [-6.3167, 39.5500]
  };

  // ANGALIA KAMA NI ADMIN AU MTEJA
  var urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('admin') === 'true') {
    document.getElementById('mtejaApp').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    onyeshaOda();
    return;
  }

  // ANGALIA KAMA MTEJA AMETHIBITISHIWA
  if (urlParams.get('confirmed') === 'true') {
    onyeshaUkurasaWaDereva();
    return;
  }

  function pimaUmbali(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 10) / 10;
  }

  function tafutaDerevaKaribu(lat, lon) {
    var derevaKaribu = madereva[0];
    var umbaliMdogo = 99999;
    madereva.forEach(d => {
      var umbali = pimaUmbali(lat, lon, d.lat, d.lon);
      if (umbali < umbaliMdogo) {
        umbaliMdogo = umbali;
        derevaKaribu = d;
      }
    });
    return derevaKaribu;
  }

  document.getElementById('pickup').addEventListener('input', jaribuKuhesabuUmbali);
  document.getElementById('dropoff').addEventListener('input', jaribuKuhesabuUmbali);

  function jaribuKuhesabuUmbali() {
    var pickup = document.getElementById('pickup').value.trim();
    var dropoff = document.getElementById('dropoff').value.trim();
    if(coordinates[pickup] && coordinates[dropoff] && pickup!== dropoff) {
      var c1 = coordinates[pickup];
      var c2 = coordinates[dropoff];
      document.getElementById('distance').value = pimaUmbali(c1[0], c1[1], c2[0], c2[1]);
    }
  }

  document.querySelectorAll('.payment-btn').forEach(btn => {
    btn.onclick = () => {
      njiaYaMalipo = btn.dataset.method;
      document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('selectedText').innerText = 'Umechagua: ' + njiaYaMalipo;
    };
  });

  document.getElementById('priceBtn').onclick = function() {
    var phone = document.getElementById('mtejaPhone').value.trim();
    var pickup = document.getElementById('pickup').value.trim();
    var dropoff = document.getElementById('dropoff').value.trim();
    var distanceKm = parseFloat(document.getElementById('distance').value);
    var vehicle = document.getElementById('vehicleType').value;
    var labor = document.getElementById('labor').checked;

    if(!phone ||!pickup ||!dropoff ||!distanceKm ||!njiaYaMalipo) {
      return alert('Jaza sehemu zote na uchague malipo');
    }

    var beiPerKm = 0, basePrice = 0;
    if(vehicle === "Bodaboda") { basePrice = 500; beiPerKm = 600; }
    if(vehicle === "Bajaji") { basePrice = 1000; beiPerKm = 1000; }
    if(vehicle === "Sedan") { basePrice = 2000; beiPerKm = 1500; }
    if(vehicle === "Pickup") { basePrice = 5000; beiPerKm = 2500; }

    beiYaMwisho = Math.round(basePrice + (beiPerKm * distanceKm));
    if(labor) beiYaMwisho += 5000;
    depositAmount = Math.round(beiYaMwisho * 0.3);

    if (coordinates[pickup]) {
      var c = coordinates[pickup];
      derevaAliyechaguliwa = tafutaDerevaKaribu(c[0], c[1]);
    } else {
      derevaAliyechaguliwa = madereva[0];
    }

    document.getElementById('onyeshaBei').innerText = beiYaMwisho.toLocaleString();
    document.getElementById('onyeshaDeposit').innerText = depositAmount.toLocaleString();
    document.getElementById('onyeshaUmbali').innerText = distanceKm;
    document.getElementById('driverInfo').innerText = 'Dereva Aliyepangwa: ' + derevaAliyechaguliwa.jina;
    document.getElementById('kiasiChaKulipa').innerText = depositAmount.toLocaleString();
    document.getElementById('nambaYaMalipo').innerText = NAMBA_ZA_MALIPO[njiaYaMalipo];
    document.getElementById('beiContainer').style.display = 'block';
    document.getElementById('paymentInfo').style.display = 'block';
    document.getElementById('uploadBox').style.display = 'block';
    document.getElementById('btnWasilisha').style.display = 'block';
  };

  document.getElementById('btnWasilisha').onclick = function() {
    var transId = document.getElementById('transId').value.trim();
    var picha = document.getElementById('pichaMuamala').files[0];
    var nambaYaMteja = document.getElementById('mtejaPhone').value.replace(/[^0-9]/g, '');
    if (nambaYaMteja.startsWith('0')) nambaYaMteja = '255' + nambaYaMteja.substring(1);

    if(!transId ||!picha) return alert('Weka namba ya muamala na picha');

    var order = {
      id: Date.now(),
      transId: transId,
      phone: nambaYaMteja,
      pickup: document.getElementById('pickup').value,
      dropoff: document.getElementById('dropoff').value,
      km: document.getElementById('distance').value,
      total: beiYaMwisho,
      deposit: depositAmount,
      driver: derevaAliyechaguliwa,
      status: 'pending',
      time: new Date().toLocaleString()
    };

    // Hifadhi kwenye LocalStorage
    var orders = JSON.parse(localStorage.getItem('amot_orders') || '[]');
    orders.push(order);
    localStorage.setItem('amot_orders', JSON.stringify(orders));

    // Tuma WhatsApp kwako kukujulisha
    var msg = AMOT ODA MPYA!\nMteja: ${nambaYaMteja}\nMuamala: ${transId}\nDeposit: ${depositAmount}\nThibitisha: ${window.location.origin}${window.location.pathname}?admin=true;
    window.open('https://wa.me/' + NAMBA_YA_MMILIKI + '?text=' + encodeURIComponent(msg));

    document.getElementById('uploadBox').style.display = 'none';
    document.getElementById('btnWasilisha').style.display = 'none';
    document.getElementById('subiriUthibitisho').style.display = 'block';
  };

  function onyeshaUkurasaWaDereva() {
    var total = urlParams.get('total');
    var deposit = urlParams.get('deposit');
    var km = urlParams.get('km');
    var jinaLaDereva = urlParams.get('drivername');
    var nambaYaDereva = urlParams.get('driver');

    document.getElementById('fomuYote').style.display = 'none';
    document.getElementById('beiContainer').style.display = 'block';
    document.getElementById('paymentInfo').style.display = 'none';
    document.getElementById('uploadBox').style.display = 'none';
    document.getElementById('subiriUthibitisho').style.display = 'none';
    document.getElementById('chatDereva').style.display = 'block';

    document.getElementById('onyeshaBei').innerText = parseInt(total).toLocaleString();
    document.getElementById('onyeshaDeposit').innerText = parseInt(deposit).toLocaleString();
    document.getElementById('onyeshaUmbali').innerText = km;
    document.getElementById('title').innerText = 'Malipo Yamethibitishwa!';
    document.getElementById('driverInfo').innerText = 'Dereva Wako: ' + decodeURIComponent(jinaLaDereva);
    document.getElementById('chatDereva').innerText = 'CHAT NA ' + decodeURIComponent(jinaLaDereva).toUpperCase();

    document.getElementById('chatDereva').onclick = function() {
      var msg = "Habari " + decodeURIComponent(jinaLaDereva) + ", malipo yamethibitishwa. Nipo tayari.";
      window.open('https://wa.me/' + nambaYaDereva + '?text=' + encodeURIComponent(msg));
    };
  }

  function onyeshaOda() {
    var orders = JSON.parse(localStorage.getItem('amot_orders') || '[]');
    var html = '';
    orders.reverse().forEach(order => {
      if(order.status === 'pending') {
        html += `
          <div class="order-card">
            <b>${order.time}</b><br>
            Mteja: ${order.phone}<br>
            Safari: ${order.pickup} → ${order.dropoff}<br>
            Deposit: TZS ${order.deposit.toLocaleString()} | Muamala: ${order.transId}<br>
            Dereva: ${order.driver.jina}<br>
            <button onclick="thibitishaOda(${order.id})">THIBITISHA MALIPO</button>
          </div>
        `;
      }
    });
    document.getElementById('ordersList').innerHTML = html || '<p>Hakuna oda mpya</p>';
  }

  window.thibitishaOda = function(orderId) {
    var orders = JSON.parse(localStorage.getItem('amot_orders') || '[]');
    var order = orders.find(o => o.id === orderId);
    if(!order) return;

    order.status = 'confirmed';
    localStorage.setItem('amot_orders', JSON.stringify(orders));

    // Tuma link kwa mteja
    var baseUrl = window.location.origin + window.location.pathname;
    var linkKwaMteja = baseUrl + "?confirmed=true";
    linkKwaMteja += "&driver=" + order.driver.namba;
    linkKwaMteja += "&drivername=" + encodeURIComponent(order.driver.jina);
    linkKwaMteja += "&total=" + order.total;
    linkKwaMteja += "&deposit=" + order.deposit;
    linkKwaMteja += "&km=" + order.km;

    var msg = Amot: Malipo yako yamethibitishwa. Bonyeza link hii kumpata dereva wako: ${linkKwaMteja};
    window.open('https://wa.me/' + order.phone + '?text=' + encodeURIComponent(msg));

    alert('Umethibitisha! Mteja ametumiwa link.');
    onyeshaOda();
  };
});
</script>
</body>
</html>
